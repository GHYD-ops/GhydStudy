<html lang="ar" dir="rtl">
<head>

    <link rel="stylesheet" href="https://cdn.moyasar.com/mpf/1.14.0/moyasar.css">
    <script src="https://cdn.moyasar.com/mpf/1.14.0/moyasar.js"></script>
</head>
<body>

    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="support.html">إذا عندك سؤال</a>
        <a href="aboutme.html">About me</a>
    </nav>

    <h1 class="title">إتمام الدفع</h1>

    <main class="card pay-card">
        <h3 class="pay-header">
            <span class="label-text">الدفع عبر</span><br>
            <span class="bold-text">STC Pay</span>
        </h3>
        <div class="price">
            <span id="stc">0535851272</span>
            <button class="copy-btn" onclick="copyText('stc', this)">نسخ</button>
        </div>

        <hr class="divider">

        <h3 class="pay-header">
            <span class="label-text">الدفع عبر</span><br>
            <span class="bold-text">التحويل البنكي</span>
        </h3>
        <p class="bank-text">للحصول على بيانات التحويل</p>
        <a href="https://t.me/Ghaidll" class="telegram-link">
            <button type="button">هنا</button>
        </a>

        <hr class="divider">

        <p class="description">بعد الدفع، أرسل اسمك للحصول على الروابط</p>
        <a href="https://t.me/Ghaidll" class="telegram-link">
            <button type="button">هنا</button>
        </a>

        <div class="mysr-form"></div>
    </main>

    <script>
        function copyText(elementId, btn) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.innerText;
                const originalBg = btn.style.backgroundColor;

                btn.innerText = "✓";
                btn.style.backgroundColor = "#4CAF50";
                btn.style.color = "white";

                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.backgroundColor = originalBg;
                    btn.style.color = "";
                }, 2000);
            });
        }
    </script>
</body>
</html>
